<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤسسة الإغاثة والطوارئ — حالات تحتاج دعمك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1F4E79;
    --primary-light: #2563a8;
    --teal: #0F6E56;
    --orange: #C55A11;
    --accent: #e8a020;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 4px 24px rgba(26,58,92,0.10);
    --shadow-lg: 0 8px 40px rgba(26,58,92,0.18);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  header { background: var(--primary); padding: 20px 0; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
  .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
  .logo-area { display: flex; align-items: center; gap: 15px; }
  .logo-img { height: 60px; width: auto; background: var(--white); padding: 5px; border-radius: 8px; }
  .logo-text { color: var(--white); }
  .logo-text h1 { font-size: 1.4rem; font-weight: 700; }
  .logo-text p { font-size: 0.85rem; color: #cbd5e1; }
  
  .hero { background: linear-gradient(135deg, #1A3E62 0%, #2E6B9E 100%); color: var(--white); padding: 50px 20px; text-align: center; margin-bottom: 40px; box-shadow: inset 0 -10px 20px rgba(0,0,0,0.05); }
  .hero h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; }
  .hero p { font-size: 1.1rem; color: #e2e8f0; max-width: 600px; margin: 0 auto; }
  
  .main-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
  .section-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
  .case-card { background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; border: 1px solid var(--border); opacity: 0; transform: translateY(20px); animation: fadeInUp 0.4s forwards; }
  .case-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: #cbd5e1; }
  
  .case-card-top { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: flex-start; }
  .case-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  .icon-sp { background: #fff1f2; color: #e11d48; }
  .icon-em { background: #f0fdf4; color: #16a34a; }
  .icon-ro { background: #eff6ff; color: #2563eb; }
  .icon-wa { background: #f0f9ff; color: #0284c7; }
  .case-code { background: #f1f5f9; color: var(--primary); font-weight: 700; font-size: 0.85rem; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
  
  .case-card-body { padding: 0 20px 20px; flex-grow: 1; display: flex; flex-direction: column; }
  .case-service { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; tracking-wide: 0.05em; margin-bottom: 4px; }
  .case-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
  .case-desc { font-size: 0.95rem; color: #475569; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1; background: #f8fafc; padding: 12px; border-radius: 8px; border-right: 3px solid #cbd5e1; }
  
  .case-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .case-meta-item { font-size: 0.85rem; background: #f8fafc; padding: 4px 10px; border-radius: 6px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; border: 1px solid #f1f5f9; }
  
  .case-actions { display: flex; gap: 12px; }
  .btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; text-align: center; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--teal); color: var(--white); box-shadow: 0 4px 12px rgba(15,110,86,0.2); }
  .btn-primary:hover { background: #0c5744; }
  .btn-outline { background: var(--white); color: var(--primary); border: 2px solid var(--primary); }
  .btn-outline:hover { background: #f1f5f9; }
  
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-content { background: var(--white); width: 100%; max-width: 600px; border-radius: var(--radius); box-shadow: var(--shadow-lg); animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); overflow: hidden; position: relative; }
  .modal-header { background: var(--primary); color: var(--white); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 1.3rem; font-weight: 700; }
  .close-modal { background: none; border: none; color: var(--white); font-size: 1.5rem; cursor: pointer; opacity: 0.8; }
  .close-modal:hover { opacity: 1; }
  .modal-body { padding: 25px; max-height: 70vh; overflow-y: auto; }
  .modal-section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
  .modal-section:last-child { border: none; margin: 0; padding: 0; }
  .modal-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
  .modal-value { font-size: 1.05rem; color: var(--text); font-weight: 700; }
  .modal-story { background: #f8fafc; padding: 15px; border-radius: 8px; border-right: 4px solid var(--accent); margin-top: 5px; font-size: 1rem; color: #334155; text-align: justify; }
  
  .loading-container { text-align: center; padding: 60px 0; grid-column: 1 / -1; }
  .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
  .loading-text { font-weight: 600; color: var(--primary); }
  
  .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }
  .empty-icon { font-size: 3.5rem; margin-bottom: 15px; }
  .empty-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .empty-desc { color: var(--text-muted); font-size: 0.95rem; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  @media (max-width: 768px) {
    .nav-container { flex-direction: column; text-align: center; gap: 15px; }
    .hero h2 { font-size: 1.8rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="hero">
  <h2>بوابة الخير والإغاثة</h2>
  <p>تبرعك الآن يساهم مباشرة في توفير حياة كريمة للأسر الأكثر استحقاقاً في كافة محافظات مصر.</p>

<div class="main-container">
  <div class="section-title">
    <span>📋 الحالات العاجلة المتاحة حالياً</span>
  </div>
  
  <div class="grid" id="casesGrid">
    <div class="loading-container" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">جاري تحميل الحالات المعتمدة...</div>
    </div>
  </div>
</div>

<div class="modal" id="caseModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">تفاصيل الحالة</h3>
      <button class="close-modal" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      </div>
  </div>
</div>

<script>
// الرابط الخاص بجوجل شيت المحدث والنهائي
const SHEET_URL = "https://script.google.com/macros/s/AKfycby_TzDiRCE75n9kAmsYJ1_cR9B0peXNhrcxCFkCqnLFI217d0cu5Hi_-VB17sF48iXk/exec";
let allCases = [];

async function loadCases() {
  const grid = document.getElementById('casesGrid');
  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    
    // فلترة وفرز البيانات لتقرأ العناوين العربية الصحيحة
    allCases = data.map(row => {
      return {
        code: row["الكود"] || row["كود الحالة"] || '',
        service: row["تصنيف الخدمة والتدخل المطلوب الأساسي للحالة"] || '',
        gov: row["المحافظة"] || '',
        family: row["عدد أفراد الأسرة المقيمين مع الحالة"] || '',
        partner: row["اسم الجمعية الشريكة بالكامل"] || '',
        summary: row["نص نثري مختصر جداً يوضح ملخص الحالة والظروف الميدانية والاجتماعية"] || '',
        reviewNotes: row["ملاحظات المراجع"] || row["ملاحظات المراجعة"] || '' 
      };
    }).filter(c => c.reviewNotes && c.reviewNotes.trim() !== ""); // تم تصحيح حرف N ليعمل الفلتر بناءً على وجود الملاحظات

    grid.innerHTML = '';
    
    if (allCases.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🤝</div>
          <div class="empty-title">لا توجد حالات حالياً</div>
          <div class="empty-desc">تمت تلبية جميع الحالات المفتوحة وجاري مراجعة حالات جديدة لتظهر هنا قريباً.</div>
        </div>`;
      return;
    }

    allCases.forEach((c, i) => {
      let icon = '📦', iconClass = 'icon-sp';
      if (c.service.includes('إعمار')) { icon = '🏠'; iconClass = 'icon-em'; }
      else if (c.service.includes('سقف')) { icon = '🪵'; iconClass = 'icon-ro'; }
      else if (c.service.includes('وصلة مياه')) { icon = '🚰'; iconClass = 'icon-wa'; }
      else if (c.service.includes('مشروع')) { icon = '💼'; iconClass = 'icon-sp'; }

      const story = c.summary || 'حالة مستحقة تحتاج إلى دعمك للحصول على مسكن لائق وحياة كريمة.';
      const storyShort = story.length > 120 ? story.substring(0, 120) + '...' : story;
      const waMsg = encodeURIComponent(`أريد التبرع للحالة:\nالكود: ${c.code}\nالخدمة: ${c.service}\nالمحافظة: ${c.gov}`);
      
      const card = `
      <div class="case-card" style="animation-delay:${i*0.05}s">
        <div class="case-card-top">
          <div class="case-icon ${iconClass}">${icon}</div>
          ${c.code ? `<span class="case-code">${c.code}</span>` : ''}
        </div>
        <div class="case-card-body">
          <div class="case-service">${c.service || 'خدمة إغاثية'}</div>
          <div class="case-title">${c.service.split('(')[0] || 'حالة إنسانية'} · ${c.gov || 'محافظة مصري'}</div>
          <div class="case-desc">${storyShort}</div>
          <div class="case-meta">
            ${c.gov ? `<div class="case-meta-item">📍 ${c.gov}</div>` : ''}
            ${c.family ? `<div class="case-meta-item">👨‍👩‍👧 ${c.family} أفراد</div>` : ''}
            ${c.partner ? `<div class="case-meta-item">🤝 ${c.partner}</div>` : ''}
          </div>
          <div class="case-actions">
            <button class="btn btn-outline" onclick="openModal(${i})">التفاصيل</button>
            <a href="https://wa.me/201019183424?text=${waMsg}" target="_blank" class="btn btn-primary">تبرع الآن</a>
          </div>
        </div>
      </div>`;
      grid.insertAdjacentHTML('beforeend', card);
    });

  } catch (err) {
    console.error(err);
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">فشل تحميل البيانات</div>
        <div class="empty-desc">يرجى التحقق من اتصالك بالإنترنت وتحديث الصفحة مجدداً.</div>
      </div>`;
  }
}

function openModal(idx) {
  const c = allCases[idx];
  document.getElementById('modalTitle').innerText = `تفاصيل الحالة كود: ${c.code || 'غير متوفر'}`;
  
  const bodyHtml = `
    <div class="modal-section">
      <div class="modal-label">الخدمة المطلوبة والتدخل الأساسي</div>
      <div class="modal-value">${c.service || 'غير محدد'}</div>
    </div>
    <div class="modal-section" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
      <div>
        <div class="modal-label">المحافظة</div>
        <div class="modal-value">📍 ${c.gov || 'غير محدد'}</div>
      </div>
      <div>
        <div class="modal-label">عدد أفراد الأسرة</div>
        <div class="modal-value">👨‍👩‍👧 ${c.family || 'غير محدد'} أفراد</div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">الجمعية الشريكة المسؤولة</div>
      <div class="modal-value">🤝 ${c.partner || 'غير محدد'}</div>
    </div>
    <div class="modal-section">
      <div class="modal-label">القصة والوضع الاجتماعي الميداني للحالة</div>
      <div class="modal-story">${c.summary || 'لا يوجد وصف نثري للحالة.'}</div>
    </div>
    <div class="modal-section" style="margin-top:25px;">
      <a href="https://wa.me/201019183424?text=${encodeURIComponent('أريد التبرع للحالة كود: ' + c.code)}" target="_blank" class="btn btn-primary" style="width:100%;">تواصل عبر واتساب للتبرع للحالة</a>
    </div>
  `;
  
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('caseModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('caseModal').style.display = 'none';
}

window.onclick = function(event) {
  const modal = document.getElementById('caseModal');
  if (event.target == modal) closeModal();
}

document.addEventListener('DOMContentLoaded', loadCases);
</script>
</body>
</html>
